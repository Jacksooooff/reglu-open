task: tofu
model_family: phi-1.5

data:
  path: locuslab/TOFU
  split: forget10
  question_key: question
  answer_key: answer
  base_answer_key: paraphrased_answer
  perturbed_answer_key: perturbed_answer

model:
  model_path: ./outputs/tofu-forget-phi/checkpoints/checkpoint-last
  base_model_path: ./outputs/tofu-finetune-phi/checkpoints/checkpoint-last
  tokenizer_path: ./outputs/tofu-forget-phi/checkpoints/checkpoint-last
  local_files_only: false
  trust_remote_code: true
  torch_dtype: bfloat16

lora:
  enabled: false
  targets: all
  r: 0
  alpha: 32
  dropout: 0.0

method:
  name: reglu
  variant: ihl
  init_strategy: rila
  rol_lambda: 0.0
  rol_rank: 128
  rol_targets: all_lora

evaluation:
  batch_size: 30
  ds_size: 300
  split_symbol: null
  max_length: 200
  max_new_tokens: null
  retain_result: null
  overwrite: true

runtime:
  output_dir: ./outputs/tofu-eval-phi
  device: auto
  dry_run: false
